name: Harvest Reflections

# Nightly self-improvement loop. Reads the past 7 days of docs-sync PRs,
# distills their REFLECTION.md files into 1-3 AGENTS.md rule proposals
# and 1-2 repo-map.yaml skip-pattern proposals, opens a draft PR for a
# maintainer to review.
#
# This is the ONE LLM call this workflow makes (Gemini Flash, ~free).
# The harvester + proposal formatter are deterministic Python.

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    # Daily at 09:00 UTC. Cron has minute,hour,DoM,month,DoW columns.
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window in days'
        required: false
        default: '7'

# One harvest at a time; cancel-in-progress is fine because the
# pipeline is fully derived from on-disk + GitHub state.
concurrency:
  group: docs-sync-harvest
  cancel-in-progress: true

jobs:
  harvest:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MODEL_API_BASE: https://generativelanguage.googleapis.com/v1beta/openai/
      MODEL_NAME: gemini-2.5-flash
      MAX_CONTEXT_CHARS: "200000"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout website (docs-sync-test)
        uses: actions/checkout@v4
        with:
          ref: docs-sync-test
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'pyyaml>=6.0,<7.0' 'openai>=1.30' 'tenacity>=8.0'

      - name: Run harvester
        id: harvest
        continue-on-error: true
        run: |
          set +e
          python .docs-sync/harvest.py \
            --repo "${{ github.repository }}" \
            --days "${{ github.event.inputs.days || 7 }}"
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: No proposals — skip PR
        if: steps.harvest.outputs.exit_code == '1'
        run: echo '::notice::Harvester found nothing worth promoting this cycle.'

      - name: Unrecoverable error
        if: steps.harvest.outputs.exit_code == '20'
        run: |
          echo '::error::Harvester hit an unrecoverable error.'
          exit 1

      # Open a draft PR with the proposal. Branch name is dated so multiple
      # nights of proposals don't clobber each other if the previous run's
      # PR wasn't merged yet (peter-evans will update the existing PR if
      # the branch already exists, which is also fine).
      - name: Open harvest proposal PR
        if: steps.harvest.outputs.exit_code == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: docs-sync-test
          branch: docs-sync/harvest-proposal
          delete-branch: false
          draft: true
          labels: docs-sync,harvest-proposal
          commit-message: |
            chore(docs-sync): nightly harvest proposal

            Reflections distilled into proposed AGENTS.md / repo-map.yaml
            additions. See HARVEST_PROPOSAL.md on this branch.
          title: 'chore(docs-sync): harvest proposals — review and fold in'
          body: |
            ## Summary

            Nightly self-improvement loop ran. The consolidator (Gemini
            Flash, single call) distilled the past week's REFLECTION.md
            files into proposed additions for `AGENTS.md` and
            `repo-map.yaml`.

            See [`HARVEST_PROPOSAL.md`](.docs-sync/HARVEST_PROPOSAL.md) on
            this branch for the full list with rationales and source-PR
            citations.

            ## Reviewer checklist

            - [ ] Each proposed AGENTS.md rule has a clear, defensible "Earned from ..." citation
            - [ ] Each proposed skip-pattern is narrow enough not to over-block
            - [ ] Move approved entries into the canonical files in a follow-up commit on this PR
            - [ ] Close any proposals that don't generalize
