name: Build Docs Digest

# Regenerates .docs-sync-digest/ whenever docs content changes.
# This is layer 2 of the docs-sync two-layer digest model — pre-built
# token-efficient summaries of every doc page, used by the eventual
# docs-sync agent so it never has to read raw .md with shortcodes.
#
# The workflow ONLY triggers on changes to content/en/** so commits
# back to .docs-sync-digest/ don't loop. Per D9, the digest is committed
# directly to the branch (no separate digest branch).

permissions:
  contents: write

on:
  push:
    branches: [main, docs-sync-test]
    paths:
      - 'content/en/**'
      - '.docs-sync/digest/**'
      - '.github/workflows/build-docs-digest.yml'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild'
        required: false
        default: 'Manual trigger'

# One run at a time per branch — earlier runs cancelled if a newer push lands
# while they're in flight. Cancellation is safe: the digest is fully derived
# from on-disk content; partial state on the branch is impossible because
# we commit at the end as one atomic operation.
concurrency:
  group: build-docs-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need to commit back, so persist credentials.
          persist-credentials: true
          # Full history not needed — we only ever look at the current tree.
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Only pyyaml is strictly needed by the four digest scripts;
          # pin loosely so dependabot can bump.
          pip install 'pyyaml>=6.0,<7.0'

      - name: Build PER_PAGE/ digests
        run: python .docs-sync/digest/build_docs_digest.py

      - name: Extract TAXONOMY.json
        run: python .docs-sync/digest/extract_taxonomy.py

      - name: Extract COVERAGE.json
        run: python .docs-sync/digest/extract_coverage.py

      - name: Build INDEX.md
        run: python .docs-sync/digest/build_index.py

      - name: Commit digest back if changed
        run: |
          # GitHub-actions bot identity for clean attribution
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Stage the digest tree
          git add .docs-sync-digest/

          # Exit cleanly if nothing changed (the input content tree didn't
          # produce a different digest — common case for non-content commits
          # like CSS-only changes that get caught by the path filter).
          if git diff --staged --quiet; then
            echo '::notice::Digest unchanged — no commit needed.'
            exit 0
          fi

          # Compose a clear commit message so history is traceable.
          git commit -m "chore(docs-sync): regenerate digest

          Auto-regenerated by .github/workflows/build-docs-digest.yml after
          changes to content/en/**. Source commit: ${GITHUB_SHA::7}."

          # Push back to the same branch.
          git push origin HEAD:${GITHUB_REF#refs/heads/}

          echo '::notice::Digest committed.'
