name: Docs Sync

# Receives `repository_dispatch` events from upstream forks (krkn, krkn-hub,
# krkn-ai, cerberus, krknctl) when a PR merges. Runs the orchestrator to
# decide whether the merge requires a docs PR, then opens one if needed.
#
# Loop-prevention: this workflow opens PRs that target docs-sync-test (per
# D15). Those PRs use a separate set of triggers (push to specific paths)
# so the dispatch chain doesn't recurse.

permissions:
  contents: write
  pull-requests: write
  models: read

on:
  repository_dispatch:
    types: [docs-sync]

  # Allow manual trigger for testing — payload schema matches dispatch
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repo (e.g., antedotee/krkn-hub)'
        required: true
      pr_number:
        description: 'PR number on upstream'
        required: true
      head_sha:
        description: 'Head SHA of merged PR'
        required: true
      base_sha:
        description: 'Base SHA the PR merged into'
        required: true

# One run per upstream-PR-sha. Cancel-in-progress is safe because the
# pipeline is fully derived from the inputs; partial state isn't possible.
concurrency:
  group: >-
    docs-sync-${{
      github.event.client_payload.upstream_repo
        || github.event.inputs.upstream_repo
    }}-${{
      github.event.client_payload.head_sha
        || github.event.inputs.head_sha
    }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # Pattern 1: existing user secrets work as-is. config.py reads
      # GEMINI_API_KEY directly when MODEL_API_KEY isn't set.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MODEL_API_BASE: https://generativelanguage.googleapis.com/v1beta/openai/
      MODEL_NAME: gemini-2.5-flash
      MAX_CONTEXT_CHARS: "200000"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout website (docs-sync-test branch)
        uses: actions/checkout@v4
        with:
          ref: docs-sync-test
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'pyyaml>=6.0,<7.0' 'openai>=1.30' 'tenacity>=8.0'

      - name: Install Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Initialize Hugo modules
        run: |
          hugo mod tidy 2>/dev/null || true

      - name: Run docs-sync orchestrator
        id: orchestrate
        # continue-on-error: distinguish clean skips (exit 10/11) from real
        # errors (exit 20) downstream — the workflow's own success state
        # only fails if exit was 20 or 2 (Hugo broke).
        continue-on-error: true
        run: |
          set +e
          python .docs-sync/orchestrator.py \
            --upstream-repo "${{ github.event.client_payload.upstream_repo || github.event.inputs.upstream_repo }}" \
            --pr-number    "${{ github.event.client_payload.pr_number    || github.event.inputs.pr_number }}" \
            --head-sha     "${{ github.event.client_payload.head_sha     || github.event.inputs.head_sha }}" \
            --base-sha     "${{ github.event.client_payload.base_sha     || github.event.inputs.base_sha }}"
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # ── Skip / error reporting ──────────────────────────────────────
      - name: Stage A skip
        if: steps.orchestrate.outputs.exit_code == '10'
        run: echo '::notice::Stage A skipped — no doc-affecting paths.'

      - name: Stage B skip
        if: steps.orchestrate.outputs.exit_code == '11'
        run: echo '::notice::Stage B skipped — upstream digest unchanged.'

      - name: No files modified
        if: steps.orchestrate.outputs.exit_code == '1'
        run: echo '::notice::Gates passed but regen produced no diff (already in sync).'

      - name: Extractor deferred for this upstream
        if: steps.orchestrate.outputs.exit_code == '13'
        run: echo '::notice::Path gate fired but the extractor for this upstream is not yet wired. No PR opened.'

      - name: Hugo build broke
        if: steps.orchestrate.outputs.exit_code == '2'
        run: |
          echo '::error::Mechanical regen produced output that broke the Hugo build.'
          exit 1

      - name: Unrecoverable error
        if: steps.orchestrate.outputs.exit_code == '20'
        run: |
          echo '::error::orchestrator hit an unrecoverable error.'
          exit 1

      # Inspect STATE.md (written by the orchestrator) to decide whether
      # the PR needs the `judge-flagged` label. Grep is good enough — the
      # marker is a stable token written by orchestrator._draft_added_scenarios
      # into the notes field, which round-trips through the JSON block.
      - name: Compute PR labels from STATE.md
        id: compute_labels
        if: steps.orchestrate.outputs.exit_code == '0'
        run: |
          if [ -f .docs-sync/STATE.md ] && grep -q "judge-flagged" .docs-sync/STATE.md; then
            echo "labels=docs-sync,judge-flagged" >> $GITHUB_OUTPUT
            echo '::notice::At least one draft was flagged by the judge — adding judge-flagged label.'
          else
            echo "labels=docs-sync" >> $GITHUB_OUTPUT
          fi

      # ── Open the docs PR (Slice 1, mechanical-regen path) ───────────
      - name: Open docs-sync PR
        if: steps.orchestrate.outputs.exit_code == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: docs-sync-test
          branch: >-
            docs-sync/${{
              github.event.client_payload.upstream_repo
                || github.event.inputs.upstream_repo
            }}-${{
              github.event.client_payload.head_sha
                || github.event.inputs.head_sha
            }}
          delete-branch: true
          draft: true
          labels: ${{ steps.compute_labels.outputs.labels }}
          commit-message: |
            docs(sync): mechanical regen from upstream PR

            Source: ${{ github.event.client_payload.upstream_repo || github.event.inputs.upstream_repo }}#${{ github.event.client_payload.pr_number || github.event.inputs.pr_number }}
            Head:   ${{ github.event.client_payload.head_sha || github.event.inputs.head_sha }}
          title: >-
            docs(sync): mechanical regen for
            ${{ github.event.client_payload.upstream_repo || github.event.inputs.upstream_repo }}#${{
              github.event.client_payload.pr_number || github.event.inputs.pr_number
            }}
          body: |
            ## Specification

            Auto-generated by docs-sync after upstream PR merged. This PR
            regenerates parameter tables in `_tab-*.md` files between the
            `<!-- AUTO:START -->` markers placed by the Slice 0.5 migration.

            **Source:** [${{ github.event.client_payload.upstream_repo || github.event.inputs.upstream_repo }}#${{ github.event.client_payload.pr_number || github.event.inputs.pr_number }}](https://github.com/${{ github.event.client_payload.upstream_repo || github.event.inputs.upstream_repo }}/pull/${{ github.event.client_payload.pr_number || github.event.inputs.pr_number }})

            ## Assumptions

            - Stage A (path allowlist) and Stage B (digest diff) both passed.
            - Modified scenarios came through the krkn-hub extractor's
              ChangeSet — added/removed scenarios are deferred to Slice 2
              (prose generation).
            - The original column layout in each affected tab file was
              preserved; only data rows between AUTO markers were rewritten.

            ## Changed behavior

            See diff. Each touched file is a tab variant of a scenario doc;
            the parameter table inside `<!-- AUTO:START id="params" -->`...`<!-- AUTO:END -->`
            now reflects the merged upstream state.

            ## Testing rationale

            - Hugo build (`hugo --quiet --minify --gc`) passed after regen.
            - 233 unit tests covering extractor, table parser, marker
              region replacement, idempotency, pipeless tables, escape handling.

            ## Architectural impact

            None — regen only touches content between AUTO markers. Site
            layout, shortcodes, navigation, frontmatter all unchanged.

            ## Run state

            See [`.docs-sync/STATE.md`](.docs-sync/STATE.md) on this branch for
            the per-scenario progress trail (status, target files, judge
            verdicts, token usage). If this PR is labeled `judge-flagged`,
            the Phi-4-mini judge raised a concern about at least one drafted
            scenario — review those pages closely before merging.
